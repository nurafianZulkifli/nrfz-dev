<style>
    #cv-bat {
        background-size: cover;
        background-position: center;
        height: 70vh;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    #cv-bat::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 100%;
        width: 100vw;
        margin-left: calc(-50vw + 50%);
        background: linear-gradient(to bottom,
                rgba(236, 236, 234, 0) 0%,
                rgba(236, 236, 234, 0) 15%,
                rgba(236, 236, 234, 0.3) 35%,
                rgba(236, 236, 234, 0.6) 50%,
                rgba(236, 236, 234, 0.85) 65%,
                rgba(236, 236, 234, 1) 80%,
                rgba(236, 236, 234, 1) 100%);
        -webkit-backdrop-filter: blur(25px);
        backdrop-filter: blur(25px);
        -webkit-mask-image: linear-gradient(to top,
                black 0%,
                black 40%,
                rgba(0, 0, 0, 0.6) 60%,
                rgba(0, 0, 0, 0.2) 80%,
                transparent 100%);
        mask-image: linear-gradient(to top,
                black 0%,
                black 53%,
                rgba(0, 0, 0, 0.6) 60%,
                rgba(0, 0, 0, 0.2) 80%,
                transparent 100%);
        z-index: -1;
    }

    body.dark-mode #cv-bat::before {
        background: linear-gradient(to bottom,
                rgba(18, 21, 33, 0) 0%,
                rgba(18, 21, 33, 0) 15%,
                rgba(18, 21, 33, 0.3) 35%,
                rgba(18, 21, 33, 0.6) 50%,

    #cv-bat .container {

    .bus-stop-code {

        border-radius: 5px;

    body.dark-mode .bus-stop-code {

    /* Cover Search Wrapper */
    .cover-search-wrapper {

    <script>
        if (window.PWAConfig) {
            const basePath = window.PWAConfig.basePath;
            const bgElement = document.getElementById('cv-bat');

            // Check dark mode preference using the same logic as buszy.js
            const _themePreference = localStorage.getItem('theme-preference') || 'system';
            const _prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            let isDarkMode = false;

            if (_themePreference === 'dark') {
                isDarkMode = true;
            } else if (_themePreference === 'light') {
                isDarkMode = false;
            } else if (_themePreference === 'system') {
                isDarkMode = _prefersDark;
            }

            const imageName = isDarkMode ? 'hero-buszy-dark.png' : 'hero-buszy.png';
            const imageUrl = basePath + 'img/bg-img/' + imageName;

            if (bgElement) {
                bgElement.style.backgroundImage = `url('${imageUrl}')`;
            }
        }
    </script>

    <script>
        // Category tab switching functionality
        const categoryTabs = document.querySelectorAll('.category-tab');
        const tabContents = document.querySelectorAll('.tab-content');

        categoryTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const category = tab.getAttribute('data-category');

                // Remove active class from all tabs and contents
                categoryTabs.forEach(t => t.classList.remove('active'));
                tabContents.forEach(content => content.classList.remove('active'));

                // Add active class to clicked tab and corresponding content
                tab.classList.add('active');
                const contentElement = document.getElementById(category + '-content');
                if (contentElement) {
                    contentElement.classList.add('active');
                }
            });
        });

        // Add hidden class styling for filtered items
        const style = document.createElement('style');
        style.textContent = '.list-group-item.hidden { display: none; }';
        document.head.appendChild(style);
    </script>
