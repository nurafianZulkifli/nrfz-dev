    <!-- Title/Breadcrumbs -->
    <section class="about-me-sum clearfix">
        <div class="wbnrfz_eicw">
            <div class="page-header-section">
                <div class="container container-xxl container-mobile container-mobile-header">
                    <div class="breadcrumb-wrapper">
                        <nav aria-label="breadcrumb" class="breadcrumb-desktop" style="display:none;">

    <div class="container-md main-content">
        <!-- Service Header Section -->
        <div class="service-header" id="service-header">
            <div class="service-number-badge" id="service-number">---</div>
            <div class="service-info">
                <h1 id="service-title">Loading...</h1>
            </div>
        </div>

        <!-- Quick Info Cards -->
        <div class="row">
            <div class="col-md-6 col-lg-4 box-indiv">
                <div class="port-summary port-cat text-center mb-80">
                    <div class="summ-icon">
                        <i class="fa-solid fa-clock"></i>
                    </div>
                    <h3 style="font-size: 18px; font-weight: bolder;">Operating Hours</h3>
                    <h4 style="font-size: 18px;" id="operating-hours">---</h4>
                </div>
            </div>

            <div class="col-md-6 col-lg-4 box-indiv">
                <div class="port-summary port-year text-center mb-80">
                    <div class="summ-icon">
                        <i class="fa-solid fa-stopwatch"></i>
                    </div>
                    <h3 style="font-size: 18px; font-weight: bolder;" id="frequency-title">Frequency</h3>
                    <h4 style="font-size: 18px;" id="frequency">---</h4>
                </div>
            </div>

            <div class="col-md-6 col-lg-4 box-indiv">
                <div class="port-summary port-year text-center mb-80">
                    <div class="summ-icon">
                        <i class="fa-regular fa-money-bill"></i>
                    </div>
                    <h3 style="font-size: 18px; font-weight: bolder;">Fares</h3>
                    <h4 style="font-size: 18px;" id="fare">---</h4>
                </div>
            </div>
        </div>

        <!-- Short Bus Service -->
        <section class="short-bus-service" id="short-bus-section" style="display: none;">
            <h2><i class="fa-kit fa-lta-bus"></i> Short Bus Service/Variants</h2>
            <div class="service-links" id="short-bus-content">
                ---
            </div>
        </section>

        <!-- Parent Bus Service -->
        <section class="parent-bus-service" id="parent-bus-section" style="display: none;">
            <h2><i class="fa-kit fa-lta-bus"></i> Parent Bus Service</h2>
            <div class="service-links" id="parent-bus-content">
                ---
            </div>
        </section>

        <!-- Express Variant -->
        <section class="express-variant" id="express-variant-section" style="display: none;">
            <h2><i class="fa-kit fa-lta-bus"></i> Express Variant</h2>
            <div class="service-links" id="express-variant-content">
                ---
            </div>
        </section>

        <!-- Remarks Section -->
        <section class="remarks-section" id="remarks-section" style="display: none;">
            <div class="service-desc" id="remarks-content">
                ---
            </div>
        </section>

        <!-- Route Section -->
        <section class="route-section">
            <h2><i class="fa-solid fa-route"></i> Route</h2>
            <div class="route-terminals">
                <div class="terminal">
                    <div class="terminal-label">Starts At</div>
                    <div class="terminal-name" id="terminal-start">---</div>
                </div>
                <div class="route-arrow"><i class="fa-solid fa-arrow-down"></i></div>

                <div class="loop">
                    <div class="terminal-label">Loops At</div>
                    <div class="terminal-name" id="terminal-loop">---</div>
                </div>

                <div class="route-arrow"><i class="fa-solid fa-arrow-down"></i></div>
                <div class="terminal">
                    <div class="terminal-label">Ends At</div>
                    <div class="terminal-name" id="terminal-end">---</div>
                </div>
            </div>
        </section>

        <!-- Stops Section -->
        <section class="stops-section">
            <h2><i class="fa-kit fa-lta-bus-stop"></i> Bus Stops (<span id="stops-count">0</span>)</h2>
            <div class="stops-container" id="stops-container">
                <div class="loading-placeholder">Loading stops...</div>
            </div>
        </section>
    </div>
