            <button class="btn btn-busloc btn-sm" id="current-location-btn" title="Go to Current Location">
                <i class="fa-regular fa-location-crosshairs"></i>&nbsp;&nbsp;Current Location
            </button>
            <div id="bus-map" style="height: 400px; width: 100%;"></div>
        </div>
    </section>

    <section class="about-me-summ clearfix" style="padding-bottom: 5em;">
        <div class="container">
            <!-- Combined Legend Container -->
            <div class="bus-load-legend">
                <!-- Fleet Legend -->
                <div class="fleet-legend">
                    <span>
                        <i class="fa-kit fa-lta-bus"></i> Single
                    </span>
                    <span style="gap: 2px;">
                        <i class="fa-kit fa-lta-bb"></i>&nbsp; Bendy
                    </span>
                    <span>
                        <i class="fa-kit fa-lta-dd"></i> Double
                    </span>
                </div>

                <!-- Bus Load Legend -->
                <div class="load-indicators-group">
                    <span class="load-indicator empty">
                        Seats Available
                    </span>
                    <span class="load-indicator moderate">
                        Standing Available
                    </span>
                    <span class="load-indicator full">
                        Limited Standing
                    </span>
                </div>
            </div>

            <!-- Incoming Buses Section -->
            <div id="incoming-buses-section" style="display: none; margin-bottom: 1em;">
                <h3 style="font-weight: bold; margin-bottom: 0.5rem;">
                    Incoming Buses
                </h3>
                <p style="font-size: 0.9rem; color: #999; margin-bottom: 1rem; text-align: left;">
                    *Buses might not
                    arrive in exact order
                </p>
                <div id="incoming-buses-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem;">
                    <!-- Incoming buses will be populated here -->
                </div>
            </div>

            <!-- Responsive Cards -->
            <div class="row" id="bus-arrivals-container">
                <div class="col-12 text-center">
                    <p id="loading-message" style="display: flex; align-items: center; justify-content: center;">
                        <span class="spinner-border" role="status" style="margin-right: 1em;">
                        </span>Loading Data...
                    </p>
                </div>
            </div>
        </div>
    </section>
