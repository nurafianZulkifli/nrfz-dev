        <script>
            function displayVersion() {
                const versionEl = document.getElementById('app-version-display');
                if (versionEl && window.APP_VERSIONS && window.APP_VERSIONS['fin-track']) {
                    versionEl.textContent = `Version ${window.APP_VERSIONS['fin-track']}`;
                }
            }

            // Listen for version loading event from app-version.js
            window.addEventListener('versionsLoaded', displayVersion);

            // Also try on DOMContentLoaded in case event already fired
            document.addEventListener('DOMContentLoaded', displayVersion);

            // Fallback: check after a short delay
            setTimeout(displayVersion, 500);
        </script>

        <script>
            // Randomize Other Apps section
            document.addEventListener('DOMContentLoaded', function () {
                const apps = [
                    {

                        href: '../buszy/index.html',
                        icon: '../buszy/assets/icon-512.png'
                    },
                    {
                        name: 'RailBuddy',
                        href: '../rail-buddy/index.html',
                        icon: '../rail-buddy/assets/icon-512.png'
                    }
                ];

                const randomApp = apps[Math.floor(Math.random() * apps.length)];

                const appLink = document.getElementById('appLink');
                const appIcon = document.getElementById('appIcon');
                const appName = document.getElementById('appName');

                if (appLink && appIcon && appName) {
                    appLink.href = randomApp.href;
                    appIcon.src = randomApp.icon;
                    appIcon.alt = randomApp.name;
                    appName.textContent = randomApp.name;

            });
