    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="js/ft-subp.js"></script>

    <script>
        const MONTHS = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        function load() {
            try {
                const s = JSON.parse(localStorage.getItem('fintrack'));
                if (!s) return null;
                return s;
            } catch { return null; }
        }

        function save(state) {
            localStorage.setItem('fintrack', JSON.stringify(state));
        }

        function activeAccount(state) {
            return state.accounts.find(a => a.id === state.activeAccountId) || state.accounts[0];
        }

        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
        }

        function initSettings() {
            const state = load();
            if (!state || !state.accounts || state.accounts.length === 0) {
                // No accounts yet – still allow settings/import to work
                return;
            }
            const acct = activeAccount(state);
            document.getElementById('settingsAcctName').value = acct.name;
            document.getElementById('settingsAllocated').value = acct.allocated;
            document.getElementById('settingsMonth').value = state.activeMonth;
            document.getElementById('settingsYear').value = state.activeYear;
        }

        function saveSettings() {
            const state = load();
            if (!state) { showToast('Error: No data found'); return; }
            const name = document.getElementById('settingsAcctName').value.trim();
            const alloc = parseFloat(document.getElementById('settingsAllocated').value);
            const month = parseInt(document.getElementById('settingsMonth').value);
            const year = parseInt(document.getElementById('settingsYear').value);
            if (!name) { showToast('Enter an account name'); return; }
            if (!alloc || alloc <= 0) { showToast('Enter a valid allocated amount'); return; }
            if (!year || year < 2020) { showToast('Enter a valid year'); return; }
            const acct = activeAccount(state);
            acct.name = name;
            acct.allocated = alloc;
            state.activeMonth = month;
            state.activeYear = year;
            save(state);
            showToast('Settings saved');
        }

        function deleteAccount() {
            const state = load();
            if (!state) { showToast('Error: No data found'); return; }
            const acct = activeAccount(state);
            if (!confirm('Delete "' + acct.name + '" and all its transactions?')) return;
            state.accounts = state.accounts.filter(a => a.id !== state.activeAccountId);
            if (state.accounts.length === 0) {
                localStorage.removeItem('fintrack');
            } else {
                if (state.activeAccountId !== state.accounts[0].id) {
                    state.activeAccountId = state.accounts[0].id;
                }
                save(state);
            }
            showToast('Account deleted');
            setTimeout(() => { window.location.href = 'index.html'; }, 500);
        }

        function exportData() {
            const state = load();
            if (!state) { showToast('Error: No data to export'); return; }
            const json = JSON.stringify(state, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'fintrack-backup-' + new Date().toISOString().slice(0, 10) + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('Data exported');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!imported.accounts || !Array.isArray(imported.accounts)) {
                        showToast('Invalid file format');
                        return;
                    }
                    if (!confirm('This will replace all your current accounts. Continue?')) return;
                    // Strip archived flags, cycleStartDate and resetOffset so all transactions count
                    imported.accounts.forEach(function(a) {
                        delete a.cycleStartDate;
                        delete a.resetOffset;
                        if (a.transactions) a.transactions.forEach(function(t) { delete t.archived; });
                    });
                    imported._migrated = true;
                    save(imported);
                    showToast('Data imported successfully');
                    setTimeout(() => { window.location.href = 'index.html'; }, 500);
                } catch (err) {
                    showToast('Error reading file');
                }
            };
            reader.readAsText(file);
        }

        // Initialize on load
        initSettings();
    </script>
